{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Password - Vendora Eats</title>
    <link rel="stylesheet" href="{% static 'css/create_password.css' %}">
</head>
<body>
<div class="card">

    <!-- Logo -->
    <div class="logo-row">
        <div class="logo-icon">
            <img src="{% static 'images/logo.png' %}" alt="Logo" style="height:18px;width:auto;">
        </div>
        <span class="logo-name">Vendora <span class="logo-eats">Eats</span></span>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="progress-label">Step 3 of 3</div>
    </div>

    <h1>Create a password</h1>
    <p class="sub">Keep your Vendora Eats account secure</p>

    <form method="POST" id="passwordForm">
        {% csrf_token %}

        <!-- Password Field -->
        <div class="field-wrap">
            <input
                type="password"
                name="password"
                id="password"
                placeholder="Enter password"
                oninput="validate()"
                autofocus
                required
            >
            <button class="eye-btn" type="button" onclick="toggleEye('password', this)" tabindex="-1">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>

        <!-- Strength Bar -->
        <div class="strength-wrap">
            <div class="strength-bars">
                <div class="sbar" id="b1"></div>
                <div class="sbar" id="b2"></div>
                <div class="sbar" id="b3"></div>
                <div class="sbar" id="b4"></div>
            </div>
            <div class="strength-label" id="strength-label">Enter a password</div>
        </div>

        <!-- Requirements -->
        <ul class="reqs">
            <li class="req" id="req-length">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path id="icon-length" d="M15 9l-6 6M9 9l6 6"/>
                </svg>
                At least 8 characters
            </li>
            <li class="req" id="req-number">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path id="icon-number" d="M15 9l-6 6M9 9l6 6"/>
                </svg>
                At least 1 number
            </li>
            <li class="req" id="req-special">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path id="icon-special" d="M15 9l-6 6M9 9l6 6"/>
                </svg>
                At least 1 special character
            </li>
        </ul>

        <!-- Trust line -->
        <div class="trust">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2L4 6v6c0 5 3.5 9.7 8 11 4.5-1.3 8-6 8-11V6l-8-4z"/>
            </svg>
            Your password is encrypted and secure
        </div>

        <button type="submit" class="btn" id="continue-btn" disabled>Continue</button>
    </form>
</div>

<script>
function toggleEye(id, btn) {
    const inp = document.getElementById(id);
    const isPass = inp.type === 'password';
    inp.type = isPass ? 'text' : 'password';
    btn.innerHTML = isPass
        ? `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
        : `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

const levels = ['Weak', 'Fair', 'Good', 'Strong'];
const colors = ['#ef4444', '#f59e0b', '#84cc16', '#1FCB03'];

function setReq(id, iconId, met) {
    const li = document.getElementById(id);
    const path = document.getElementById(iconId);
    li.classList.toggle('met', met);
    li.querySelector('circle').setAttribute('stroke', met ? '#1FCB03' : 'currentColor');
    path.setAttribute('d', met ? 'M9 12l2 2 4-4' : 'M15 9l-6 6M9 9l6 6');
    path.setAttribute('stroke', met ? '#1FCB03' : 'currentColor');
}

function validate() {
    const val = document.getElementById('password').value;
    const hasLen = val.length >= 8;
    const hasNum = /[0-9]/.test(val);
    const hasSpec = /[^A-Za-z0-9]/.test(val);

    setReq('req-length', 'icon-length', hasLen);
    setReq('req-number', 'icon-number', hasNum);
    setReq('req-special', 'icon-special', hasSpec);

    const score = [hasLen, hasNum, hasSpec, val.length >= 12 && hasLen && hasNum && hasSpec].filter(Boolean).length;

    ['b1','b2','b3','b4'].forEach((id, i) => {
        document.getElementById(id).style.background = i < score ? colors[score - 1] : '#e5e7eb';
    });

    const label = document.getElementById('strength-label');
    label.textContent = val.length === 0 ? 'Enter a password' : (levels[score - 1] || 'Weak');
    label.style.color = val.length === 0 ? '#bbb' : (colors[score - 1] || '#ef4444');

    const allMet = hasLen && hasNum && hasSpec;
    const btn = document.getElementById('continue-btn');
    btn.disabled = !allMet;
    btn.classList.toggle('active', allMet);
    document.getElementById('password').classList.toggle('valid-input', allMet);
}
</script>
</body>
</html>

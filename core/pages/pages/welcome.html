<!-- templates/pages/welcome.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Foodie</title>
    <link rel="stylesheet" href="{% static 'css/onboarding.css' %}">
</head>
<body>
    <div class="onboarding-container">
        <div class="hero-image">
            <img src="{% static 'images/welcome-hero.png' %}" alt="Delicious Food">
        </div>
        <div class="content">
            <h1>Fast delivery at your doorstep</h1>
            <p>Order from the best local restaurants with ease and speed.</p>
            
            <!-- Link to our main restaurant list app -->
           {% comment %}  <a href="{% url 'restaurants:home' %}" class="btn-get-started">Get Started</a> {% endcomment %}
            <a href="{% url 'accounts:login' %}" class="btn-get-started">Get Started</a>

        </div>
    </div>
</body>
</html>
